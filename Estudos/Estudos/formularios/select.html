<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../assets/css/select.css">
        <title>SELECT</title>
    </head>
    <body>
        <h1>Formulário</h1>
        <form action="/cadastro" method="get">
            <select name="Parcelas">
                <option value="0">-- Parcelas --</option>
                <option value="1">R$ 1.000,00 - 1x sem juros</option>
                <option value="2">R$ 500,00 - 2x sem juros</option>
                <option value="3">R$ 333,34 - 3x sem juros</option>
                <option value="4">R$ 250,00 - 4x sem juros</option>
            </select>
            <br><br>
            <input type="submit" name="Enviar">
        </form>
    </body>
</html>
