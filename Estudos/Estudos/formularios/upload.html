<html lang="pt-br">
    <head>

    <body>
        <h1>Formulário</h1>
        <form action="/cadastro" enctype="multipart/form-data" method="post"><!--nunca utiliza method= get apenas post isso é uma regra, procure no site https://developer.mozilla.org/en-US/docs/Web/HTML/Attributes/accept-->

            <input type="submit" name="Enviar">
        </form>
    </body>
