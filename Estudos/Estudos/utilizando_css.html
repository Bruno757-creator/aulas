<html>
    <head>
        <title>PÁGINA INICIAL</title>
        <meta charset="utf-8" />
        <style>
            h2{
                color: red;
                font-size: 15px;
            }
        </style><!--podemos mudar o padrao de alguma tag do body a partir do head tbm como foi mostrado neste
        exemplo do h2-->
        <link rel="stylesheet" href="./assets/css/utilizando_css.css"/><!--Neste exemplo o css fica em uma pasta fora 
        e a gente tem que botar a referencia (href) de onde esta-->
    </head>
    <body>
        <H1 style="font-size: 20px; color: blue;">GOOGLE</H1><!--Podemos utilizar o estilo no propria tag do body
        ou mesmo se quiser podemos usar no head-->
        <H2>Faça sua pesquisa</H2>
        <h3>Jogando futebol</h3>
        <h2 class="titulo">Eu quero esse h2 amarelo</h2><!--Neste exemplo atraves do class eu consigo puxar qual 
        classe que eu quero no css facilitando a separação de stylo-->
        <p id="paragrafo">O céu é azul as nuvens são brancas</p><!--Neste caso do id é a mesma coisa da class
        a diferença que o id você só pode usar uma vez, nao tem como usar em mais de 1 paragrafo, ele é unico.
         Outra coisa, no css o # chama uma id do html é o . chama a class-->
    </body>
</html>
