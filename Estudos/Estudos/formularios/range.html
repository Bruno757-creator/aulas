<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>RANGE</title>
    </head>
    <body>
        <h1>Formulário</h1><br>
        <form action="/cadastro" method="get">
            <label>Defina o Nivel</label>
            <br>
            <input type="range" min="0" max="100" value="0" name="percentual">
            <br><br>
            <input type="submit" name="Enviar">
        </form> 
    </body>
</html>
