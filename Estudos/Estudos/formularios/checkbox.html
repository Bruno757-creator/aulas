<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CHECKBOX</title>
    </head>
    <body>
        <h1>Formulário</h1>
        <form action="/cadastro" method="get">
            <br>
            <input id="Banana" type="checkbox" name="Banana">
            <label for="Banana">Banana</label><!--Essa label, serve para falar o que vai estar na checkbox, for serve para se você clicar na palavra ele já selecionar o chackbox-->
            <br>
            <input id="Mamão" type="checkbox" name="Mamão">
            <label for="Mamão">Mamão</label>
            <br><br>
            <input type="submit" name="Enviar">
        </form>
    </body>
</html>
